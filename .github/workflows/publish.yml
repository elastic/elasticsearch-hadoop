name: Publish to GitHub Packages

on:
  push:
    tags: [ "v*" ]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDKs
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            8
            11
            17
            21

      - name: Export JDK home env vars
        run: |
          echo "JAVA8_HOME=$JAVA_HOME_8_X64" >> "$GITHUB_ENV"
          echo "JAVA11_HOME=$JAVA_HOME_11_X64" >> "$GITHUB_ENV"
          echo "JAVA17_HOME=$JAVA_HOME_17_X64" >> "$GITHUB_ENV"
          echo "JAVA21_HOME=$JAVA_HOME_21_X64" >> "$GITHUB_ENV"
          echo "JAVA_HOME=$JAVA_HOME_21_X64" >> "$GITHUB_ENV"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Publish elasticsearch-spark-30 to GitHub Packages
        run: |
          ./gradlew :elasticsearch-spark-30:publishAllPublicationsToGitHubPackagesRepository \
            --no-daemon \
            -PpublishGroupId=com.github.zeotuan \
            -x javadoc -x spark30scala212Javadoc -x spark30scala212JavadocJar \
            -x spark35scala212Javadoc -x spark35scala212JavadocJar \
            -x spark35scala213Javadoc -x spark35scala213JavadocJar \
            -x javadocJar
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
