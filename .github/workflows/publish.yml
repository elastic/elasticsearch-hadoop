name: Publish to GitHub Packages

on:
  push:
    tags: [ "v*" ]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Publish elasticsearch-spark-30 to GitHub Packages
        run: |
          ./gradlew :elasticsearch-spark-30:publishAllPublicationsToGitHubPackagesRepository \
            --no-daemon \
            -PpublishGroupId=com.github.zeotuan \
            -x javadoc -x spark30scala212Javadoc -x spark30scala212JavadocJar \
            -x spark35scala212Javadoc -x spark35scala212JavadocJar \
            -x spark35scala213Javadoc -x spark35scala213JavadocJar \
            -x javadocJar
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
