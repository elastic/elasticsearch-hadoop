import org.elasticsearch.hadoop.gradle.BuildPlugin

plugins {
    id 'es.hadoop.build'
    id 'com.gradleup.shadow' version "9.0.1"
}

description = "Elasticsearch Hadoop Shaded Third-Party Libraries"

configurations {
    shaded {
        transitive = false
        canBeResolved = true
    }
    implementation {
        extendsFrom shaded
    }
}

BuildPlugin.disableTransitiveDependencies(project, configurations.shaded)

dependencies {
    shaded("commons-httpclient:commons-httpclient:3.0.1")
    shaded("com.fasterxml.jackson.core:jackson-core:${project.ext.jackson2Version}")
    shaded("com.fasterxml.jackson.core:jackson-annotations:${project.ext.jackson2Version}")
    shaded("com.fasterxml.jackson.core:jackson-databind:${project.ext.jackson2Version}")
}

shadowJar {
    configurations = [project.configurations.shaded]
    relocate 'org.apache.commons.httpclient', 'org.elasticsearch.hadoop.thirdparty.apache.commons.httpclient'
    relocate 'com.fasterxml.jackson', 'org.elasticsearch.hadoop.thirdparty.fasterxml.jackson'
}
